                    <li class="active">Danh sách khách hàng</li>

                        Danh sách khách hàng

                            <i class="ace-icon fa fa-angle-double-right"></i>

                    </h1>

                                <h3 class="widget-title">
                                    <i class="ace-icon glyphicon glyphicon-search"></i>

                                <span class="widget-toolbar">
										<a href="#" data-action="reload" onclick="window.location.href='/admin/customers/list'; return false;">
											<i class="ace-icon fa fa-refresh"></i>
										</a>

										<a href="#" data-action="collapse">
											<i class="ace-icon fa fa-chevron-up"></i>
										</a>

										<a href="#" data-action="close">
											<i class="ace-icon fa fa-times"></i>
										</a>
									</span>
                            </div>

                            <div class="widget-body">
                                <div class="widget-main">
                                    <!-- form-request -->
                                    <form id="customer-search-form" th:action="@{/admin/customers/list}" method="GET" th:object="${params}" >
                                        <div class="row"
                                             style="font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif">

                                            <div class="form-group">
                                                <div class="col-xs-12">
                                                    <div class="col-xs-6">
                                                        <label> Tên khách hàng </label>
                                                        <input type="text" id="fullName" name="fullName" value="" th:field="*{fullName} "
                                                               placeholder="Customer name" class="form-control">
                                                    </div>
                                                    <div class="col-xs-6">
                                                        <label> Email </label>
                                                        <input type="text" id="email" name="email" value="" th:field="*{email}"
                                                               placeholder="Email" class="form-control">
                                                    </div>
                                                </div>
                                            </div> <!-- name, floorArea -->

                                            <div class="form-group">
                                                <div class="col-xs-12">

                                                    <div class="col-xs-6">
                                                        <label> Số Đt </label>
                                                        <input type="text" id="phone" name="phone" value="" th:field="*{phone}"
                                                               placeholder="Phone Number" class="form-control">
                                                    </div>
                                                    <div class="col-xs-3" sec:authorize="hasRole('MANAGER')">
                                                        <label> Nhân Viên </label>
                                                        <select id="staffid" name="staffid" class="form-control"  th:field="*{staffid}">
                                                            <option value="">-- Chọn nhân viên --</option>
                                                            <option th:each="staffs:${staffs}"
                                                                    th:value="${staffs.key}"
                                                                    th:text="${staffs.value}">
                                                            </option>
                                                        </select>
                                                    </div>
                                                    <div class="col-xs-3">
                                                        <label> Trạng thái </label>
                                                        <select name="status" class="form-control" value="" th:field="*{status}">
                                                            <option value="">-- Chọn trạng thái --</option>
                                                            <option th:each="status:${status}"
                                                                    th:value="${status.key}"
                                                                    th:text="${status.value}">
                                                        </select>
                                                    </div>
                                                </div>
                                            </div> <!-- Adress (district, ward, street) -->


                                            <div class="form-group">
                                                <div class="col-xs-12">
                                                    <div class="col-xs-12">
                                                        <button class="btn btn-sm btn-purple" id="btn-search"
                                                                style="border-radius: 6px;"
                                                                >
                                                            <i class="ace-icon glyphicon glyphicon-search"></i>
                                                            Tìm kiếm
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            <style>
                                                .form-group>.col-xs-12>div {
                                                    margin-bottom: 15px;
                                                }
                                            </style>
                                        </div>
                                    </form>

                                </div><!-- form-request -->
                            </div>
                        </div>
                        <div class="pull-right">
                            <!-- them/xoa button -->
                            <a href='/admin/customers/edit'>
                                <button class="btn btn-app btn-success btn-xs radius-4" title="Thêm khách hàng"
                                        style="font-size: 10px;border-radius: 10px;top: 10px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                         fill="currentColor" class="bi bi-house-add-fill" viewBox="0 0 16 16">
                                        <path
                                                d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 1 1-1 0v-1h-1a.5.5 0 1 1 0-1h1v-1a.5.5 0 0 1 1 0" />
                                        <path
                                                d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L8 2.207l6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z" />
                                        <path
                                                d="m8 3.293 4.712 4.712A4.5 4.5 0 0 0 8.758 15H3.5A1.5 1.5 0 0 1 2 13.5V9.293z" />
                                    </svg>
                                    <br>
                                    Thêm
                                </button></a>
                            <button class="btn btn-app btn-danger btn-xs radius-4" title="Xóa khách hàng"
                                    style="font-size: 10px;border-radius: 10px;top: 10px;" id="btn-deletecustomer">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                     class="bi bi-house-dash" viewBox="0 0 16 16">
                                    <path
                                            d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7M11 12h3a.5.5 0 0 1 0 1h-3a.5.5 0 1 1 0-1" />
                                    <path
                                            d="M7.293 1.5a1 1 0 0 1 1.414 0L11 3.793V2.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v3.293l2.354 2.353a.5.5 0 0 1-.708.708L8 2.207l-5 5V13.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 2 13.5V8.207l-.646.647a.5.5 0 1 1-.708-.708z" />
                                </svg>
                                <br>
                                Xóa
                            </button>
                        </div> <!-- them/xoa button -->

                    </div><!-- /.span -->

                </div> <!-- /.page-main -->
                <div class="hr hr-18 dotted hr-double"></div>
                <div class="row">
                    <div class="col-xs-12">
                        <table id="customer-list" class="table table-striped table-bordered table-hover"
                               style="font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif">

                            <thead>
                            <tr>
                                <th class="center">
                                    <label class="pos-rel">
                                        <input class="ace" type="checkbox" onclick="checkAll(this)">
                                        <span class="lbl"></span>
                                    </label>
                                </th>
                                <th>Tên khách hàng</th>
                                <th>Di động</th>
                                <th>Email</th>
                                <th>Nhu cầu</th>
                                <th>Người thêm</th>
                                <th>Ngày thêm</th>
                                <th>Tình trạng</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="customerResponseDTO : ${customerResponseDTOs}">
                                <td class="center">
                                    <label class="pos-rel" >
                                        <input type="checkbox" class="ace" th:value="${customerResponseDTO.getId()}">
                                        <span class="lbl"></span>
                                    </label>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getFullName()}"></span>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getPhone()}"></span>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getEmail()}"></span>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getDemand()}"></span>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getCreatedBy()}"></span>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getCreatedDate()}"></span>
                                </td>
                                <td>
                                    <span th:text="${customerResponseDTO.getStatusname()}"></span>
                                </td>
                                <td>
                                    <div class="hidden-sm hidden-xs btn-group" >
                                        <button class="btn btn-xs btn-success" title="Update"
                                                th:attr="data-id=${customerResponseDTO.id}"
                                                onclick="assignmnentcustomer(this)" style="border-radius: 5px"
                                                sec:authorize="hasRole('MANAGER')">
                                            <i class="ace-icon fa  fa-users bigger-120"></i>
                                        </button>

                                        <button class="btn btn-xs btn-purple" title="View"
                                                th:attr="data-id=${customerResponseDTO.id}"
                                                onclick="viewcustomer(this)" style="border-radius: 5px">
                                            <i class="ace-icon fa fa-eye bigger-120"></i>
                                        </button>



                                        <a th:href="@{/admin/customers/edit/{id}(id=${customerResponseDTO.id})}"
                                         class="btn btn-xs btn-info" title="Sửa"
                                                style="border-radius: 5px">
                                            <i class="ace-icon fa fa-pencil-alt bigger-120"></i>
                                        </a>

                                        <button class="btn btn-xs btn-danger" title="Xóa"
                                                th:attr="data-id=${customerResponseDTO.id}"
                                                onclick="deletecustomer(this)" style="border-radius: 5px">
                                            <i class="ace-icon far fa-trash-alt bigger-140"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            </tbody>

                        </table>
<!--                        <div class="page-navigator" th:if="${model.totalPages > 1}">-->
<!--                            <th:block th:each="pageItem: ${model.navigationPages}">-->
<!--                                &lt;!&ndash; dấu ... &ndash;&gt;-->
<!--                                <span th:if="${pageItem == -1}" class="nav-item">...</span>-->
<!--                                &lt;!&ndash; số trang &ndash;&gt;-->

<!--                                   href="#"-->
<!--                                   class="nav-item"-->
<!--                                   th:classappend="${pageItem == model.currentPage} ? ' active'"-->
<!--                                   th:text="${pageItem}"-->
<!--                                   th:onclick="'goPage(' + ${pageItem} + ')'">-->
<!--                                </a>-->

<!--                            </th:block>-->
<!--                        </div>-->

                    </div>
                </div><!-- table -->
            </div><!-- /.page-content -->
        </div>
        <!-- Modal Assignment -->
        <div class="modal fade" id="assignmentBuildingModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
             aria-hidden="true">
            <div class="modal-dialog" role="document"
                 style="top:25%;font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">
                <div class="modal-content" style="border-radius: 10px; overflow:hidden;">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Danh sách nhân viên</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"
                                style="position:absolute;top:10px;right:20px">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="col-xs-12"
                             style="font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif">
                            <table id="staff-list" class="table table-striped table-bordered table-hover">
                                <thead>
                                <tr>
                                    <th class="center">Chọn</th>
                                    <th class="center">Tên nhân viên</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>

                                </tr>
                                </tbody>
                            </table>
                            <input type="hidden" id="customerid" value="">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary " id="btn-assignmentcustomer"
                                style="border-radius: 8px; overflow:hidden;">Cập nhật nhân viên</button>
                        <button type="button" class="btn btn-secondary btn-danger" data-dismiss="modal"
                                style="border-radius: 8px; overflow:hidden;">Hủy thao
                            tác</button>
                    </div>
                </div>
            </div>
        </div><!-- Modal Assignment -->


        <!-- Modal ViewCustomer -->
        <div class="modal fade" id="viewCustomerModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog" role="document"
                 style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;width: 1400px;">
                <div class="modal-content" style="border-radius: 10px; overflow: hidden;">
                    <div class="modal-header">
                        <h5 class="modal-title" id="viewModalLabel">Chi tiết khách hàng</h5>
                    </div>
                    <div class="modal-body">
                        <div style="margin-top: 30px">
                            <div class="hr hr-18 dotted hr-double"></div>
                            <div class="row">
                                    <table id="transaction-cskh" class="table table-striped table-bordered table-hover">
                                        <tbody id="transaction-body"></tbody>
                                    </table>
                            </div><!-- table -->
                        </div> <!-- CSKH -->
                    </div>
                </div>
            </div>
        </div><!-- Modal Assignment -->

        <!-- Modal sure -->
        <div class="modal fade" id="sureModal" tabindex="-1" role="dialog">
            <div class="modal-dialog" role="document"
                 style="top:35%;font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">
                <div class="modal-content" style="border-radius: 10px; overflow:hidden;">
                    <div class="modal-header">
                        <input type="hidden" id="ids" >
                        <h4 class="modal-title">Cảnh Báo !!!</h4>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"
                                style="position:absolute;top:10px;right:20px">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body text-black-50" style="font-size:larger;">
                        <p>Bạn đang chọn xóa khách hàng này :
                        <div id="sureModalContent"
                             style="margin-top:10px; text-align:left; font-size:15px;">
                        </div>
                        </p>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger btn-primary" style="border-radius: 8px; overflow:hidden;"
                                id="btn-deleteonecustomer">Xoa khách hàng</button>
                        <button type="button" class="btn btn-secondary" data-dismiss="modal"
                                style="border-radius: 8px; overflow:hidden;">Huy</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Modal sure -->

        <a href="#" id="btn-scroll-up" class="btn-scroll-up btn btn-sm btn-inverse">
            <i class="ace-icon fa fa-angle-double-up icon-only bigger-110"></i>
        </a>
    </div>
</div><!-- /.main-container -->

<th:block th:replace="~{admin/common/footer :: footer}"></th:block>
<th:block th:replace="~{admin/common/common-scripts :: jquery}"></th:block>

<!--ajax--><!-- ace scripts -->
<script>


    $('#btn-search').click(function (e) {
        e.preventDefault();
        $('#customer-search-form')
            .find('input, select')
            .each(function () {
                let val = $(this).val();

                if (!val || val.trim() === '') {
                    $(this).prop('disabled', true);
                }
            });
        $('#customer-search-form').submit();
    })

    $('#btn-deletecustomer').click(function (e) {
        e.preventDefault();
        //var data = {};
        var ids = $('#customer-list').find('tbody input[type = checkbox]:checked').map(function () {
            return $(this).val();
        }).get();
        //data['ids'] = ids;
        $('#ids').val(ids);
        if(ids.length > 0)
        {
            loadCustomers([ids]);
            $('#sureModal').modal();}
        else {
            alert("Hảy chọn khách hàng cần xóa !!");
            return;
        }
        console.log('ok!');
    })

    function assignmnentcustomer(btn) {
        const id = $(btn).data('id');
        $('#customerid').val(id);
        $('#assignmentBuildingModal').modal();
        loadStaff(id);
    }

    $('#btn-assignmentcustomer').click(function (e) {
        e.preventDefault();
        var data = {};
        data['id'] = $('#customerid').val();
        var staffids = $('#staff-list')
            .find('tbody input[type=checkbox]:checked')
            .map(function () {
                return Number(this.value);
            })
            .get();
        data['staffids'] = staffids;
        updateAssignmentCustomer(data);
        console.log('ok! staff');
        //alert("Đã lưu thành công khách hàng");
        $('#assignmentBuildingModal').modal('hide');
    })

    function deletecustomer(btn) {
        const id = $(btn).data('id');
        $('#customerid').val(id);
        loadCustomers([id]);
        $('#sureModal').modal();
    }


    $('#btn-deleteonecustomer').click(function (e) {
        e.preventDefault();
        var id = $('#customerid').val();
        var ids = $('#ids').val();
        const targetId = ids?.trim() || id?.trim();
        if(targetId)
            DeleteCustomer(targetId);
        console.log('ok!');
        $('#sureModal').modal('hide');
    })

    $(document).ready(function () {
        $('#customer-search-form')
            .find(':disabled')
            .prop('disabled', false);
    });

    function checkAll(source) {
        $('#customer-list')
            .find('tbody input[type="checkbox"]')
            .prop('checked', source.checked);
    }

    //AJAX

    function updateAssignmentCustomer(data)
    {
        $.ajax({
            url: "/api/customers/assignmentcustomer",
            type: "PUT",
            data : JSON.stringify(data),
            dataType : "JSON",
            contentType : 'application/json',
            success : function(respond)
            {
                alert("Đã cập nhật thành công khách hàng :\n"+ respond.fullName + " (ID: " + respond.id + ")");
                console.log("OK!!!");
            },
            error: function(respond)
            {
                // xhr chứa thông tin chi tiết
                console.log("FAILED!!", respond);
                // Hiển thị chi tiết lỗi cho người dùng
                alert(respond.responseText);
            }
        });
    }
    function DeleteCustomer(data)
    {
        console.log("/api/customers/"+data);
        $.ajax(
            {
                url: "/api/customers/"+data,
                type: "DELETE",
                success : function(respond)
                {
                    alert(respond.message);
                    console.log("OK!!!");
                    location.reload();
                },
                error: function(respond)
                {
                    console.log("FAILED!!", respond);
                    // Hiển thị chi tiết lỗi cho người dùng
                    alert("Lỗi khi lưu khách hàng:\n" + respond.responseText);
                }
            });
    }
    function loadCustomers(ids) {
        $.ajax({
            url: "/api/customers/" + ids + "/customers",
            type: "GET",
            dataType: "JSON",

            success: function (response) {
                $('#sureModalContent').empty();
                let html = '';
                response.data.forEach(item => {html += `<div class = "text">• ${item.fullName} (id:  ${item.id})</div>`;});
                html+= `<div class = "center" style="font-size: large">Bạn đã chắc chưa ?!?</div>`
                $('#sureModalContent').html(html);
            },
            error: function (xhr) {
                console.log("ERROR", xhr.status, xhr.responseText);
            }
        });
    }


    function loadStaff(id) {
        $.ajax({
            url: "/api/customers/" + id + "/staffs",
            type: "GET",
            dataType: "JSON",
            success: function (response) {
                let row = '';
                $.each(response.data, function (index, item) {
                    row += `
                  <tr>
                    <td class="center">
                      <input type="checkbox"
                             value="${item.id}"
                             ${item.checkbox ? 'checked' : ''}>
                    </td>
                    <td class="center">${item.fullname}</td>
                  </tr>`;
                });
                $('#staff-list tbody').html(row);
            }
        });
    }

    function viewcustomer(btn) {
        const id = $(btn).data('id');

        $.get('/api/customers/' + id + '/transaction', function (res) {
            let map = res.data;
            let tbody = $('#transaction-body');
            tbody.empty();
            for (let key in map) {
                tbody.append(`
            <tr>
                <td colspan="6"><strong>${key}</strong></td>
            </tr>
            <tr class="group-header">
                <th style="width: 300px;">Ngày tạo</th>
                <th style="width: 300px;">Người tạo</th>
                <th style="width: 300px;">Ngày sửa</th>
                <th style="width: 300px;">Người sửa</th>
                <th>Chi tiết giao dịch</th>
            </tr>
        `);
                let list = map[key];
                if (Array.isArray(list)) {
                    list.forEach(tran => {
                        tbody.append(`
                    <tr>
                        <td>${tran.createdDate || ''}</td>
                        <td>${tran.createdBy || ''}</td>
                        <td>${tran.modifiedDate || ''}</td>
                        <td>${tran.modifiedBy || ''}</td>
                        <td>${tran.note || ''}</td>
                    </tr>
                `);
                    });
                }
            }

            $('#viewCustomerModal').modal('show');
        });
    }
</script>
</body>
</html>
